name: Zip and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual testing

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Zip Dict directory
        run: |
          # Use -r to zip the folder and its contents
          zip -r Dict.zip Dict/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Dict.zip
          # FALLBACK LOGIC: 
          # If triggered by a tag, use the tag name.
          # If triggered manually, use "manual-release-[commit-shorthand]"
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-release-{0}', github.sha) }}
          name: "Release ${{ github.ref_name }}"
          body: "Automated archive of the Dict folder."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
