name: Package and Release Zip

on:
  push:
    tags:
      - '*' # Triggers on ANY tag push (v1, 1.0, release-v1, etc.)
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows the bot to create the release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Zip Archive
        # This zips the 'Dict' folder. 
        # If 'Dict' doesn't exist, it zips the whole repo instead.
        run: |
          if [ -d "Dict" ]; then
            zip -r Dict-Release.zip Dict/
          else
            zip -r Project-Release.zip . -x "*.git*" ".github*"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }} # Forces the action to use the tag that triggered it
          files: Dict.zip
          body: "Automated release of Dict directory"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
