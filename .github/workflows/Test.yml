name: Zip Dict Directory and Upload to Release

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0, v1.1.0, etc.
  workflow_dispatch: 

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Zip Dict directory
        # We stay in the root and zip the 'Dict' folder into 'Dict.zip'
        run: |
          zip -r Dict.zip Dict/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Use the exact filename created above
          files: Dict.zip
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
