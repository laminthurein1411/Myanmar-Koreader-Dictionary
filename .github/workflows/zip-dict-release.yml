name: Zip Dict Directory and Upload to Release

on:
  push:
    tags:
      - 'v*' # Better: triggers on v1.0.0, v1.0.1, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Zip Dict directory
        run: |
          # The -q flag makes it quiet, -r is recursive
          # We check if the directory exists first to avoid confusing errors
          if [ -d "Dict" ]; then
            zip -r Dict.zip Dict/
          else
            echo "Directory Dict not found!"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Dict.zip
          # This automatically generates notes based on your commits
          generate_release_notes: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
