name: Zip Dict Directory and Upload to Release

on:
  push:
    tags:
      - 'v1.0.0' # Triggers on tags starting with v (e.g., v1.0, v2.1.4)

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for the action to create a release
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Zip Dict directory
        run: |
          cd Dict
          zip -r ../Dict.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Dict.zip
            # Add other files or patterns here (e.g., dist/*.zip)
          body: "Release notes for ${{ github.ref_name }}"
          draft: false
          prerelease: false
          
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
